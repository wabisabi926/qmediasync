name: release
on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get current time
        id: time
        run: echo "::set-output name=date::$(date +'%Y-%m-%d')"
      
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - run: git fetch --force --tags
      
      - name: Get tag name
        id: tag
        run: echo "::set-output name=name::${GITHUB_REF#refs/tags/v}"
      
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      
      - name: Build Windows amd64
        env:
          APP_VERSION: ${{ github.ref_name }}
          PUBLISH_DATE: ${{ steps.time.outputs.date }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          go mod tidy
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui -s -w -X 'main.Version=${APP_VERSION}' -X 'main.PublishDate=${PUBLISH_DATE}' -X main.ENCRYPTION_KEY=${ENCRYPTION_KEY}" -o QMediaSync_windows_amd64.exe .
      
      - name: Build Linux amd64
        env:
          APP_VERSION: ${{ github.ref_name }}
          PUBLISH_DATE: ${{ steps.time.outputs.date }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w -X 'main.Version=${APP_VERSION}' -X 'main.PublishDate=${PUBLISH_DATE}' -X main.ENCRYPTION_KEY=${ENCRYPTION_KEY}" -o QMediaSync_linux_amd64 .
      
      - name: Build Linux arm64
        env:
          APP_VERSION: ${{ github.ref_name }}
          PUBLISH_DATE: ${{ steps.time.outputs.date }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w -X 'main.Version=${APP_VERSION}' -X 'main.PublishDate=${PUBLISH_DATE}' -X main.ENCRYPTION_KEY=${ENCRYPTION_KEY}" -o QMediaSync_linux_arm64 .
      
      - name: Build FNOS FPK packages
        env:
          APP_VERSION: ${{ steps.tag.outputs.name }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          mkdir -p FNOS/qmediasync-amd64/app/web_statics
          mkdir -p FNOS/qmediasync-arm64/app/web_statics
          
          sed -i "s/^version\s*=.*/version = ${APP_VERSION}/" FNOS/qmediasync-amd64/manifest
          sed -i "s/^version\s*=.*/version = ${APP_VERSION}/" FNOS/qmediasync-arm64/manifest
          
          cp QMediaSync_linux_amd64 FNOS/qmediasync-amd64/app/QMediaSync
          cp QMediaSync_linux_arm64 FNOS/qmediasync-arm64/app/QMediaSync
          
          cp -r web_statics/* FNOS/qmediasync-amd64/app/web_statics/
          cp -r web_statics/* FNOS/qmediasync-arm64/app/web_statics/
          
          cd FNOS/qmediasync-amd64
          wget -q https://static2.fnnas.com/fnpack/fnpack-1.0.1-linux-amd64 -O fnpack
          chmod +x fnpack
          ./fnpack build
          cd ../..
          cp FNOS/qmediasync-amd64/qmediasync.fpk QMediaSync_x86_64_${APP_VERSION}.fpk
          
          cd FNOS/qmediasync-arm64
          cp ../qmediasync-amd64/fnpack .
          ./fnpack build
          cd ../..
          cp FNOS/qmediasync-arm64/qmediasync.fpk QMediaSync_arm64_${APP_VERSION}.fpk
      
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            QMediaSync_windows_amd64.exe
            QMediaSync_linux_amd64
            QMediaSync_linux_arm64
            QMediaSync_x86_64_${{ steps.tag.outputs.name }}.fpk
            QMediaSync_arm64_${{ steps.tag.outputs.name }}.fpk